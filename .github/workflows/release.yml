name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features

  build:
    name: Build ${{ matrix.name }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Linux AMD64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: tracerate-linux-amd64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: tracerate-linux-arm64
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: tracerate-macos-arm64
          - name: Windows AMD64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tracerate-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.target }}
          cache-on-failure: true

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/tracerate ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cp target/${{ matrix.target }}/release/tracerate.exe ${{ matrix.artifact }}
          $hash = (Get-FileHash ${{ matrix.artifact }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ascii ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          if-no-files-found: error

  publish:
    name: Publish to R2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Upload binaries to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp artifacts/ s3://${{ secrets.R2_BUCKET_NAME }}/tracerate/latest/ \
            --recursive \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto

      - name: Upload index.html to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          # /tracerate/index.html — explicit path
          aws s3 cp index.html s3://${{ secrets.R2_BUCKET_NAME }}/tracerate/index.html \
            --content-type "text/html" \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto
          # /tracerate — directory path (R2 has no auto index.html serving)
          aws s3 cp index.html s3://${{ secrets.R2_BUCKET_NAME }}/tracerate \
            --content-type "text/html" \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto

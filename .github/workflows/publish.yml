name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Linux AMD64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tracerate_Linux_x86_64.tar.gz
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            archive: tracerate_Linux_arm64.tar.gz
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: tracerate_Darwin_arm64.tar.gz
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            archive: tracerate_Darwin_x86_64.tar.gz
          - name: Windows AMD64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: tracerate_Windows_x86_64.zip

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.target }}
          cache-on-failure: true

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.archive }} -C target/${{ matrix.target }}/release tracerate

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/tracerate.exe -DestinationPath ${{ matrix.archive }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

  homebrew:
    name: Update Homebrew cask
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate cask
        working-directory: dist
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_DARWIN_INTEL=$(sha256sum tracerate_Darwin_x86_64.tar.gz | cut -d' ' -f1)
          SHA_DARWIN_ARM=$(sha256sum tracerate_Darwin_arm64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_INTEL=$(sha256sum tracerate_Linux_x86_64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM=$(sha256sum tracerate_Linux_arm64.tar.gz | cut -d' ' -f1)

          cat > tracerate.rb <<EOF
          # This file was generated by GitHub Actions. DO NOT EDIT.
          cask "tracerate" do
            version "${VERSION}"

            on_macos do
              on_intel do
                sha256 "${SHA_DARWIN_INTEL}"
                url "https://github.com/crazyuploader/tracerate/releases/download/v#{version}/tracerate_Darwin_x86_64.tar.gz"
              end
              on_arm do
                sha256 "${SHA_DARWIN_ARM}"
                url "https://github.com/crazyuploader/tracerate/releases/download/v#{version}/tracerate_Darwin_arm64.tar.gz"
              end
            end

            on_linux do
              on_intel do
                sha256 "${SHA_LINUX_INTEL}"
                url "https://github.com/crazyuploader/tracerate/releases/download/v#{version}/tracerate_Linux_x86_64.tar.gz"
              end
              on_arm do
                sha256 "${SHA_LINUX_ARM}"
                url "https://github.com/crazyuploader/tracerate/releases/download/v#{version}/tracerate_Linux_arm64.tar.gz"
              end
            end

            name "tracerate"
            desc "No-nonsense CLI internet speed tester"
            homepage "https://github.com/crazyuploader/tracerate"

            livecheck do
              skip "Auto-generated on release."
            end

            binary "tracerate"

            postflight do
              system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tracerate"] if OS.mac?
            end

            # No zap stanza required
          end
          EOF

      - name: Push cask to tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/crazyuploader/homebrew-tools.git" tap
          mkdir -p tap/Casks
          cp dist/tracerate.rb tap/Casks/tracerate.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/tracerate.rb
          if git diff --cached --quiet; then
            echo "Cask unchanged, nothing to push."
            exit 0
          fi
          git commit -m "Update tracerate cask to ${GITHUB_REF_NAME#v}"
          git push
